name: Release Windows Portable

# v* 태그를 push 하면 windows-latest 에서 포터블 exe 를 빌드하여
# GitHub Release 에 첨부합니다(공개 다운로드 + 앱 "업데이트 확인" 연동).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: work-organizer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build portable exe
        run: npm run build:win

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: work-organizer/dist/*.exe
          name: 업무정리 ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
