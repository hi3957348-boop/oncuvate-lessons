name: Build Windows Portable

# work-organizer 앱 변경 시 windows-latest 에서 무설치 포터블 exe 를 빌드하여 아티팩트로 업로드합니다.
on:
  push:
    branches:
      - claude/windows-task-organizer-famj4j
      - main
    paths:
      - 'work-organizer/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: work-organizer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build portable exe
        run: npm run build:win

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: 업무정리-portable-exe
          path: work-organizer/dist/*.exe
          if-no-files-found: error
