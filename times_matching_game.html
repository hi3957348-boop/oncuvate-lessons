<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>구구단 매칭게임</title>
<style>
:root{
  --cream:#FBF7EF; --paper:#fff; --ink:#3B4551; --ink2:#6B7684;
  --blue:#5B84A6; --blue-d:#3D5A6E; --peach:#F4A98A; --coral:#F08C6E;
  --mint:#8FCBB4; --mint-d:#5FAE93; --sun:#F6CE6B; --lilac:#B7A6D9; --pink:#F4B8C8;
  --line:#E7DFD1; --good:#5FAE93;
  --g-count:#4A78C4; --g-size:#E58A4E;
  --shadow:0 10px 30px rgba(80,90,110,.12); --shadow-s:0 4px 14px rgba(80,90,110,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;color:var(--ink);
  background:radial-gradient(1200px 500px at 15% -8%,#FDEfe0,transparent 60%),
    radial-gradient(1000px 500px at 95% 0%,#E7F1EC,transparent 55%),var(--cream);
  -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none}
.wrap{max-width:960px;margin:0 auto;padding:18px 16px 50px}
.top{display:flex;align-items:center;gap:12px;padding:6px 4px 14px}
.logo{font-size:22px;font-weight:900;color:var(--blue-d);letter-spacing:-.5px}
.logo small{font-size:13px;color:var(--coral);font-weight:800;margin-left:6px}
.spacer{flex:1}

/* 설정 */
.setup{background:var(--paper);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
  padding:26px 24px;max-width:620px;margin:10px auto}
.setup h1{font-size:24px;font-weight:900;color:var(--blue-d);text-align:center;margin-bottom:4px;letter-spacing:-.6px}
.setup .lead{text-align:center;color:var(--ink2);font-size:14px;font-weight:600;margin-bottom:20px}
.block{margin-bottom:20px}
.block .bt{font-size:14px;font-weight:900;color:var(--blue-d);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dans{display:flex;gap:9px;flex-wrap:wrap}
.dan{width:52px;height:52px;border-radius:16px;border:2.5px solid var(--line);background:#FCFAF5;
  font-size:20px;font-weight:900;color:var(--ink2);transition:.12s}
.dan.on{background:var(--blue);color:#fff;border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 14px rgba(91,132,166,.3)}
.dan-all{height:52px;padding:0 14px;border-radius:16px;border:2.5px dashed var(--line);background:#fff;font-weight:800;color:var(--ink2);font-size:13px}
.modes{display:flex;gap:10px}
.mode{flex:1;border:2.5px solid var(--line);border-radius:16px;background:#FCFAF5;padding:14px;text-align:center;transition:.12s}
.mode.on{border-color:var(--mint-d);background:#EAF6F0}
.mode .me{font-size:26px}
.mode .mn{font-size:15px;font-weight:900;color:var(--blue-d);margin-top:4px}
.mode .md{font-size:11.5px;color:var(--ink2);font-weight:700;margin-top:2px;line-height:1.35}
.slider-row{display:flex;align-items:center;gap:14px;background:#FCFAF5;border:2px solid var(--line);border-radius:16px;padding:12px 16px}
.slider-row input[type=range]{flex:1;height:26px;accent-color:var(--peach)}
.slider-row .val{font-size:26px;font-weight:900;color:var(--coral);width:76px;text-align:center}
.startbtn{width:100%;margin-top:8px;padding:16px;border-radius:16px;background:var(--peach);color:#fff;
  font-size:19px;font-weight:900;box-shadow:0 6px 16px rgba(240,140,110,.35);transition:.12s}
.startbtn:hover{transform:translateY(-2px)}
.startbtn:disabled{opacity:.5;transform:none;cursor:default}
.warn{color:var(--coral);font-size:12.5px;font-weight:700;text-align:center;min-height:16px;margin-top:6px}

/* 보드 */
#game{display:none}
.hud{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--paper);border:1px solid var(--line);
  border-radius:16px;box-shadow:var(--shadow-s);padding:10px 14px;margin-bottom:14px}
.hud .stat{font-size:13.5px;font-weight:800;color:var(--ink2)}
.hud .stat b{color:var(--mint-d);font-size:17px}
.hud .stat.moves b{color:var(--blue)}
.hud .ghost{margin-left:auto;background:#fff;border:2px solid var(--line);color:var(--ink2);font-weight:800;
  font-size:13px;padding:9px 14px;border-radius:12px}
.hud .ghost:hover{border-color:var(--peach);color:var(--blue-d)}
.pbar{height:10px;background:#EFE7D8;border-radius:999px;overflow:hidden;margin-bottom:14px}
.pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--mint),var(--mint-d));width:0;transition:.35s}

.board{display:grid;gap:10px}
.card{aspect-ratio:1/1;border-radius:16px;position:relative;transform-style:preserve-3d;transition:transform .3s;
  cursor:pointer}
.card .face{position:absolute;inset:0;border-radius:16px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;backface-visibility:hidden;border:2.5px solid var(--line);background:var(--paper);
  box-shadow:var(--shadow-s);padding:6px;text-align:center}
.card .front{transform:rotateY(180deg)}
.card .back{background:linear-gradient(140deg,#6E97B8,var(--blue));border-color:var(--blue-d);color:#fff;
  font-size:30px;font-weight:900}
.card.flipped{transform:rotateY(180deg)}
.card.open .front{background:#FFF8F1}          /* 공개모드 배경 */
.card .eq{font-size:22px;font-weight:900;color:var(--blue-d);letter-spacing:-.5px}
.card .eq .b{color:var(--g-size)} .card .eq .a{color:var(--g-count)}
.card .ans{font-size:30px;font-weight:900;color:var(--coral)}
.card .dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:5px;max-width:88%}
.card .dots i{width:8px;height:8px;border-radius:50%;background:var(--g-count)}
.card.sel .front{border-color:var(--peach);background:#FFF3E3;box-shadow:0 0 0 3px var(--peach)}
.card.lit .front{border-color:var(--good);background:#EAF6F0;box-shadow:0 0 0 4px var(--mint),0 0 22px rgba(95,174,147,.6);
  animation:glow .5s}
@keyframes glow{0%{transform:scale(1)}45%{transform:scale(1.08)}100%{transform:scale(1)}}
.card.gone{animation:vanish .5s forwards}
@keyframes vanish{to{opacity:0;transform:scale(.4) rotate(6deg);pointer-events:none}}
.card.bad .front{border-color:var(--coral);animation:shake .35s}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* 합쳐지는 연출(가운데 큰 식) */
#mergeLayer{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;pointer-events:none;
  background:rgba(50,60,75,0);transition:background .2s}
#mergeLayer.show{display:flex;background:rgba(50,60,75,.32)}
.merge{background:#fff;border:3px solid var(--good);border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,.25);
  padding:22px 30px;text-align:center;animation:mpop .5s}
@keyframes mpop{0%{transform:scale(.5);opacity:0}55%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.merge .meq{font-size:40px;font-weight:900;color:var(--blue-d);letter-spacing:-1px}
.merge .meq .b{color:var(--g-size)} .merge .meq .a{color:var(--g-count)} .merge .meq .r{color:var(--coral)}
.merge .mgroups{display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.merge .mg{display:grid;grid-template-columns:repeat(2,14px);gap:4px;border:2.5px solid var(--g-size);
  border-radius:50%/40%;padding:8px 10px;background:#FFF8F1}
.merge .mg.one{grid-template-columns:14px}
.merge .mg i{width:14px;height:14px;border-radius:50%;background:var(--g-count)}
.merge .mtag{margin-top:10px;font-size:14px;font-weight:800;color:var(--mint-d)}

/* 승리 */
#win{display:none;text-align:center;background:linear-gradient(135deg,#EAF3EE,#FCE7D6);border:1px solid var(--line);
  border-radius:24px;padding:30px 24px;box-shadow:var(--shadow);max-width:520px;margin:18px auto}
#win .big{font-size:52px}
#win h2{font-size:26px;font-weight:900;color:var(--blue-d);margin:6px 0}
#win p{color:var(--ink2);font-weight:700;font-size:15px}
#win .row{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}
#win button{padding:13px 22px;border-radius:14px;font-size:16px;font-weight:800}
#win .again{background:var(--mint);color:#fff}
#win .reset{background:#fff;border:2px solid var(--line);color:var(--ink2)}
.footer{text-align:center;font-size:12px;color:var(--ink2);opacity:.8;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">🎴 구구단 매칭게임<small>Oncuvate</small></div>
  </div>

  <!-- 설정 -->
  <div class="setup" id="setup">
    <h1>짝을 찾아라!</h1>
    <div class="lead">식과 답을 짝지어요. 맞추면 카드가 빛나며 <b>3 × 4 = 12</b>로 합쳐져요.</div>

    <div class="block">
      <div class="bt">① 어떤 단으로 할까요? <span style="font-weight:700;color:var(--ink2)">(여러 개 선택 가능)</span></div>
      <div class="dans" id="dans"></div>
      <div style="margin-top:8px"><button class="dan-all" onclick="allDans()">전체 선택 / 해제</button></div>
    </div>

    <div class="block">
      <div class="bt">② 놀이 방법</div>
      <div class="modes">
        <div class="mode on" id="mOpen" onclick="setMode('open')">
          <div class="me">👀</div><div class="mn">공개 모드</div><div class="md">카드가 다 보여요<br>(쉬워요)</div></div>
        <div class="mode" id="mMem" onclick="setMode('memory')">
          <div class="me">🧠</div><div class="mn">기억 모드</div><div class="md">뒤집어서 기억해요<br>(도전!)</div></div>
      </div>
    </div>

    <div class="block">
      <div class="bt">③ 카드 장 수</div>
      <div class="slider-row">
        <input type="range" id="cnt" min="8" max="30" step="2" value="16" oninput="cntUI()">
        <div class="val" id="cntv">16장</div>
      </div>
    </div>

    <button class="startbtn" id="startBtn" onclick="start()">게임 시작 🎮</button>
    <div class="warn" id="warn"></div>
  </div>

  <!-- 게임 -->
  <div id="game">
    <div class="hud">
      <span class="stat">맞춘 짝 <b id="hMatch">0</b> / <span id="hTotal">0</span></span>
      <span class="stat moves">뒤집기 <b id="hMoves">0</b></span>
      <button class="ghost" onclick="backToSetup()">⚙ 설정 바꾸기</button>
    </div>
    <div class="pbar"><i id="pbar"></i></div>
    <div class="board" id="board"></div>
  </div>

  <!-- 승리 -->
  <div id="win">
    <div class="big">🎉</div>
    <h2>모두 맞췄어요!</h2>
    <p id="winMsg"></p>
    <div class="row">
      <button class="again" onclick="restart()">한 번 더 🔁</button>
      <button class="reset" onclick="backToSetup()">설정 바꾸기</button>
    </div>
  </div>

  <div class="footer">© ONCUVATE · 구구단 매칭게임 · 시간 재기 없이 내 속도로</div>
</div>

<div id="mergeLayer"><div class="merge" id="mergeCard"></div></div>

<script>
const el=id=>document.getElementById(id);
let SEL_DANS=new Set([2,3,4,5]), MODE='open', CARDN=16;
let deck=[], first=null, lock=false, matched=0, moves=0, pairs=0;

/* 사운드 */
let _ac=null;
function sfx(kind){ try{ _ac=_ac||new (window.AudioContext||window.webkitAudioContext)(); const t=_ac.currentTime;
  const seq = kind==='ok'?[[660,0],[990,.12]] : kind==='no'?[[300,0],[180,.16]] : [[520,0]];
  seq.forEach(([f,d])=>{ const o=_ac.createOscillator(),g=_ac.createGain(); o.connect(g);g.connect(_ac.destination);
    o.frequency.setValueAtTime(f,t+d); g.gain.setValueAtTime(.1,t+d); g.gain.exponentialRampToValueAtTime(.001,t+d+.18);
    o.start(t+d); o.stop(t+d+.2); }); }catch(e){} }
function say(text){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='ko-KR'; u.rate=.9; speechSynthesis.speak(u);}catch(e){} }

/* 설정 UI */
function buildDans(){ const d=el('dans'); d.innerHTML='';
  for(let n=2;n<=9;n++){ const b=document.createElement('button'); b.className='dan'+(SEL_DANS.has(n)?' on':'');
    b.textContent=n; b.onclick=()=>{ SEL_DANS.has(n)?SEL_DANS.delete(n):SEL_DANS.add(n); buildDans(); validate(); };
    d.appendChild(b); } }
function allDans(){ if(SEL_DANS.size===8) SEL_DANS.clear(); else SEL_DANS=new Set([2,3,4,5,6,7,8,9]); buildDans(); validate(); }
function setMode(m){ MODE=m; el('mOpen').classList.toggle('on',m==='open'); el('mMem').classList.toggle('on',m==='memory'); }
function cntUI(){ CARDN=+el('cnt').value; el('cntv').textContent=CARDN+'장'; validate(); }
function factsAvailable(){ return SEL_DANS.size*9; }
function validate(){ const need=CARDN/2; const have=factsAvailable();
  const w=el('warn'); el('startBtn').disabled = SEL_DANS.size===0;
  if(SEL_DANS.size===0){ w.textContent='단을 하나 이상 골라 주세요.'; return; }
  if(need>have){ w.textContent='고른 단이 적어 최대 '+(have*2)+'장까지 가능해요. (부족한 만큼 줄여서 시작할게요)'; }
  else w.textContent='';
}

/* 카드 내용 */
function dotsHTML(a,b){ let s='<span class="dots">'; for(let i=0;i<a*b;i++) s+='<i></i>'; return s+'</span>'; }
function eqFace(f){ return '<div class="eq"><span class="b">'+f.b+'</span> × <span class="a">'+f.a+'</span></div>'+dotsHTML(f.a,f.b); }
function ansFace(f){ return '<div class="ans">'+f.v+'</div>'; }

function pickFacts(nPairs){
  let pool=[]; SEL_DANS.forEach(b=>{ for(let a=1;a<=9;a++) pool.push({b:b,a:a,v:b*a}); });
  pool.sort(()=>Math.random()-0.5);
  // 답 중복(예: 2×6과 3×4=12)이 한 판에 겹치면 헷갈리니 답 유일하게
  const seen=new Set(), chosen=[];
  for(const f of pool){ if(seen.has(f.v)) continue; seen.add(f.v); chosen.push(f); if(chosen.length===nPairs) break; }
  return chosen;
}

function start(){
  if(SEL_DANS.size===0) return;
  pairs=Math.min(CARDN/2, factsAvailable());
  const facts=pickFacts(pairs); pairs=facts.length;
  deck=[];
  facts.forEach((f,i)=>{ deck.push({pid:i,type:'eq',f}); deck.push({pid:i,type:'ans',f}); });
  deck.sort(()=>Math.random()-0.5);
  matched=0; moves=0; first=null; lock=false;
  el('setup').style.display='none'; el('win').style.display='none'; el('game').style.display='block';
  el('hTotal').textContent=pairs; el('hMatch').textContent='0'; el('hMoves').textContent='0';
  renderBoard();
}
function renderBoard(){
  const b=el('board'); const cols=Math.min(deck.length, deck.length<=12?4: (deck.length<=20?5:6));
  b.style.gridTemplateColumns='repeat('+cols+',1fr)';
  b.innerHTML=deck.map((c,i)=>{
    const faceHTML = c.type==='eq'? eqFace(c.f) : ansFace(c.f);
    const openCls = MODE==='open'? ' flipped open':'';
    return '<div class="card'+openCls+'" data-i="'+i+'" onclick="flip('+i+')">'+
      '<div class="face back">?</div>'+
      '<div class="face front">'+faceHTML+'</div></div>';
  }).join('');
  updateBar();
}
function updateBar(){ el('pbar').style.width=(pairs? matched/pairs*100:0)+'%'; }

function flip(i){
  if(lock) return; const card=document.querySelector('.card[data-i="'+i+'"]');
  if(!card || card.classList.contains('gone') || card.classList.contains('lit')) return;
  const c=deck[i];
  if(MODE==='memory'){
    if(card.classList.contains('flipped') && first && first.i===i) return;
    if(first && first.i===i) return;
    card.classList.add('flipped');
  }else{
    if(first && first.i===i){ card.classList.remove('sel'); first=null; return; }
  }
  card.classList.add('sel');
  if(!first){ first=(function(){return {i:i,c:c,el:card};})(); return; }
  // 두 번째 선택
  moves++; el('hMoves').textContent=moves;
  const a=first, bsel={i:i,c:c,el:card}; first=null;
  if(a.c.pid===bsel.c.pid && a.i!==bsel.i){ matchPair(a,bsel); }
  else { mismatch(a,bsel); }
}
function matchPair(a,b){
  lock=true;
  a.el.classList.remove('sel'); b.el.classList.remove('sel');
  a.el.classList.add('lit'); b.el.classList.add('lit'); sfx('ok');
  const f=a.c.f;
  say(f.b+' 곱하기 '+f.a+'는 '+f.v);
  setTimeout(()=>showMerge(f),450);
  setTimeout(()=>{
    a.el.classList.add('gone'); b.el.classList.add('gone');
    matched++; el('hMatch').textContent=matched; updateBar();
    lock=false;
    if(matched===pairs) setTimeout(winGame,600);
  },1500);
}
function mismatch(a,b){
  lock=true; sfx('no');
  a.el.classList.add('bad'); b.el.classList.add('bad');
  setTimeout(()=>{
    a.el.classList.remove('sel','bad'); b.el.classList.remove('sel','bad');
    if(MODE==='memory'){ a.el.classList.remove('flipped'); b.el.classList.remove('flipped'); }
    lock=false;
  },800);
}
function showMerge(f){
  const m=el('mergeCard');
  let groups='<div class="mgroups">';
  for(let i=0;i<f.a;i++){ groups+='<div class="mg'+(f.b===1?' one':'')+'">'+'<i></i>'.repeat(f.b)+'</div>'; }
  groups+='</div>';
  m.innerHTML='<div class="meq"><span class="b">'+f.b+'</span> × <span class="a">'+f.a+'</span> = <span class="r">'+f.v+'</span></div>'+
    groups+'<div class="mtag">✓ '+f.b+'개씩 '+f.a+'묶음 = '+f.v+'</div>';
  el('mergeLayer').classList.add('show');
  setTimeout(()=>el('mergeLayer').classList.remove('show'),1050);
}
function winGame(){
  el('game').style.display='none';
  el('win').style.display='block';
  el('winMsg').textContent=pairs+'쌍을 '+moves+'번 만에 모두 찾았어요! ('+[...SEL_DANS].sort((x,y)=>x-y).join('·')+'단)';
  say('참 잘했어요! 모두 맞췄어요');
}
function restart(){ start(); }
function backToSetup(){ el('game').style.display='none'; el('win').style.display='none'; el('setup').style.display='block'; }

buildDans(); cntUI(); setMode('open'); validate();
</script>
</body>
</html>
