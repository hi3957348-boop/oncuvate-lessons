<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>온큐베이트 리딩 · 체험</title>
<style>
:root{--bg:#F5F4FA;--card:#fff;--ink:#1C1A2E;--muted:#9490AA;--line:#E2DEEF;--purple:#6A5DA7;--cyan:#1BBCD4;--soft:#EEEBF8;--ok:#2F9E7B;}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
.wrap{max-width:960px;margin:0 auto;padding:26px 18px 70px;}
header{display:flex;align-items:center;gap:13px;margin-bottom:4px;flex-wrap:wrap;}
.oclogo{height:38px;}
h1{margin:0;font-size:23px;font-weight:900;letter-spacing:-.3px;background:linear-gradient(90deg,var(--purple),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;}
.sub{color:var(--muted);font-size:13.5px;margin:2px 0 20px;font-weight:600;}
.tabs{display:inline-flex;background:#EDEBF7;border-radius:12px;padding:3px;margin-bottom:18px;}
.tabs button{border:0;background:transparent;cursor:pointer;font:inherit;font-weight:800;padding:9px 18px;border-radius:9px;color:#6f679a;}
.tabs button.on{background:#fff;color:var(--purple);box-shadow:0 1px 3px rgba(0,0,0,.12);}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 6px 22px rgba(60,50,120,.07);padding:22px 22px 24px;margin-bottom:16px;}
.field{margin:0 0 14px;}
.field label{display:block;font-size:12.5px;font-weight:800;color:var(--muted);margin-bottom:6px;}
.field input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 13px;font:inherit;font-weight:700;color:#4b4470;}
.row{display:flex;gap:12px;flex-wrap:wrap;}.row .field{flex:1;min-width:150px;}
.btn{border:0;cursor:pointer;font:inherit;font-weight:800;padding:12px 20px;border-radius:13px;background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;box-shadow:0 6px 16px rgba(106,93,167,.28);}
.btn.ghost{background:#fff;color:var(--purple);border:1px solid var(--line);box-shadow:none;}
.btn:active{transform:translateY(1px);}
.bigrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
a.golink{display:inline-block;text-decoration:none;}
.who{font-size:13px;color:var(--muted);font-weight:700;margin-top:12px;}
.who b{color:var(--purple);}
.banner{background:#FFF6D8;border:1px solid #F0C64A;border-radius:12px;padding:11px 14px;font-size:12.5px;color:#8a6d1f;font-weight:700;margin-bottom:14px;}
.summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.stat{background:var(--soft);border-radius:14px;padding:12px 16px;min-width:120px;}
.stat .k{font-size:11px;color:var(--muted);font-weight:800;}.stat .v{font-size:24px;font-weight:900;color:var(--purple);}
.slist{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:16px;}
.scard{border:1px solid var(--line);border-radius:14px;padding:14px 15px;background:#fff;}
.scard .nm{font-size:16px;font-weight:900;}.scard .cl{font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:8px;}
.scard .m{display:flex;justify-content:space-between;font-size:13px;margin:3px 0;}.scard .m b{color:var(--purple);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);}
th{color:var(--muted);font-weight:800;font-size:11.5px;}
td .tag{font-size:11px;font-weight:800;padding:2px 8px;border-radius:12px;background:var(--soft);color:var(--purple);}
.empty{color:var(--muted);text-align:center;padding:30px 0;font-weight:700;}
.tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
footer{margin-top:26px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.7;}
.hide{display:none;}
@media (prefers-color-scheme:dark){:root{--bg:#17151F;--card:#211E2C;--ink:#ECEAF5;--line:#332E44;--soft:#2A2540;--muted:#9C97B4;}body{background:var(--bg);color:var(--ink);}}
</style></head><body>

<script>
var LS_S='oc_student_v1', LS_R='oc_results_v1';
function $(id){return document.getElementById(id);}
function getS(){try{return JSON.parse(localStorage.getItem(LS_S)||'null')}catch(e){return null}}
function getR(){try{return JSON.parse(localStorage.getItem(LS_R)||'[]')}catch(e){return[]}}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}

/* 탭 */
$('tabs').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;
  var r=b.dataset.r;[].forEach.call(this.children,function(x){x.classList.toggle('on',x===b);});
  $('studentPane').classList.toggle('hide',r!=='student');
  $('teacherPane').classList.toggle('hide',r!=='teacher');
  if(r==='teacher') render();
});

/* 학생 */
function showWho(){var s=getS();$('sWho').innerHTML = s&&s.name ? ('지금: <b>'+esc(s.name)+'</b>'+(s.cls?(' · '+esc(s.cls)):'')+' 로 저장돼요') : '';
  $('sGo').style.display = s&&s.name ? '' : 'none';}
$('sStart').addEventListener('click',function(){
  var name=$('sName').value.trim(); if(!name){$('sName').focus();return;}
  localStorage.setItem(LS_S, JSON.stringify({cls:$('sCls').value.trim(), name:name}));
  showWho();
});
(function(){var s=getS(); if(s){$('sCls').value=s.cls||'';$('sName').value=s.name||'';} showWho();})();

/* 교사 대시보드 */
var TYPE={fluency:{label:'유창성',unit:'음절/분'},quiz:{label:'퀴즈',unit:'%'},game:{label:'게임',unit:'%'}};
function render(){
  var cls=$('tCls').value.trim();
  var rows=getR().filter(function(r){return !cls || r.cls===cls;});
  rows.sort(function(a,b){return b.ts-a.ts;});
  if(!rows.length){$('dash').innerHTML='<div class="card"><div class="empty">아직 저장된 결과가 없어요.<br>학생 탭에서 이름을 정하고 두루책방에서 읽어 보세요.</div></div>';return;}
  // 학생별 집계
  var by={};
  rows.forEach(function(r){var k=r.name+'|'+(r.cls||'');(by[k]=by[k]||[]).push(r);});
  var students=Object.keys(by).map(function(k){
    var arr=by[k]; var name=arr[0].name, cl=arr[0].cls;
    function avg(t){var v=arr.filter(function(x){return x.t===t;}).map(function(x){return x.value;});return v.length?Math.round(v.reduce(function(a,b){return a+b;},0)/v.length):null;}
    return {name:name,cl:cl,count:arr.length,fluency:avg('fluency'),quiz:avg('quiz'),game:avg('game'),last:arr[0].ts};
  });
  var scards=students.map(function(s){return '<div class="scard"><div class="nm">'+esc(s.name)+'</div><div class="cl">'+(esc(s.cl)||'반 미지정')+' · 활동 '+s.count+'회</div>'
    +'<div class="m"><span>유창성</span><b>'+(s.fluency!=null?s.fluency+' 음절/분':'-')+'</b></div>'
    +'<div class="m"><span>퀴즈</span><b>'+(s.quiz!=null?s.quiz+'%':'-')+'</b></div>'
    +'<div class="m"><span>게임</span><b>'+(s.game!=null?s.game+'%':'-')+'</b></div></div>';}).join('');
  var trs=rows.slice(0,200).map(function(r){var d=new Date(r.ts);var dt=(d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
    var ty=TYPE[r.t]||{label:r.t,unit:''};
    return '<tr><td>'+dt+'</td><td><b>'+esc(r.name)+'</b></td><td>'+(esc(r.cls)||'-')+'</td><td>'+esc(r.book)+'</td><td><span class="tag">'+ty.label+'</span></td><td><b>'+r.value+'</b> '+ty.unit+'</td></tr>';}).join('');
  $('dash').innerHTML='<div class="summary">'
    +'<div class="stat"><div class="k">학생</div><div class="v">'+students.length+'</div></div>'
    +'<div class="stat"><div class="k">활동 기록</div><div class="v">'+rows.length+'</div></div></div>'
    +'<div class="slist">'+scards+'</div>'
    +'<div class="card"><table><thead><tr><th>시간</th><th>이름</th><th>반</th><th>책</th><th>유형</th><th>결과</th></tr></thead><tbody>'+trs+'</tbody></table>'
    +'<div class="tools"><button class="btn ghost" id="csv">CSV 내려받기</button><button class="btn ghost" id="clr">결과 비우기(데모)</button></div></div>';
  $('csv').onclick=function(){var head='시간,이름,반,책,유형,값\n';
    var body=rows.map(function(r){var d=new Date(r.ts);var ty=TYPE[r.t]||{label:r.t};
      return [d.toLocaleString('ko-KR'),r.name,r.cls,r.book,ty.label,r.value].map(function(x){return '"'+String(x==null?'':x).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
    var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(head+body);a.download='oncuvate_results.csv';a.click();};
  $('clr').onclick=function(){if(confirm('이 기기에 저장된 결과를 모두 지울까요? (데모용)')){localStorage.removeItem(LS_R);render();}};
}
</script>
</body></html>
