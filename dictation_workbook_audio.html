<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>받침 연음 받아쓰기 · 소리 듣기</title>
<style>
:root{--cream:#FBF7EF;--ink:#3B4551;--ink2:#6B7684;--blue-d:#3D5A6E;--coral:#F08C6E;--mint-d:#5FAE93;--sun:#F6CE6B;--lilac:#B7A6D9;--line:#E7DFD1;--shadow:0 10px 30px rgba(80,90,110,.14)}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;color:var(--ink);
 background:radial-gradient(900px 500px at 50% -10%,#FBE7D6,transparent 60%),var(--cream);
 display:flex;flex-direction:column;align-items:center;min-height:100%;-webkit-user-select:none;user-select:none}
.wrap{width:min(440px,94vw);padding:18px 0 30px;text-align:center}
header{display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 12px}
.logo{height:30px}.ht{font-weight:800;color:var(--blue-d);font-size:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:22px 18px 24px}
.sub{display:inline-block;background:var(--sun);color:#6a5316;font-weight:800;font-size:13px;padding:5px 14px;border-radius:999px;margin-bottom:12px}
.num{font-size:58px;font-weight:900;color:var(--coral);line-height:1}
.prog{color:var(--ink2);font-weight:700;font-size:14px;margin:4px 0 16px}
.play{width:100%;background:var(--coral);color:#fff;border:none;border-radius:18px;font-weight:800;font-size:24px;padding:20px;box-shadow:var(--shadow);cursor:pointer}
.play:active{transform:translateY(1px)}
.slow{width:100%;background:var(--lilac);color:#fff;border:none;border-radius:16px;font-weight:800;font-size:17px;padding:13px;margin-top:10px;cursor:pointer}
.nav{display:flex;gap:10px;margin-top:14px}
.nav button{flex:1;background:#fff;border:2px solid var(--line);border-radius:14px;font-weight:800;font-size:16px;padding:13px;color:var(--blue-d);cursor:pointer}
.nav button:disabled{opacity:.4}
.ans{margin-top:14px;background:transparent;border:none;color:var(--ink2);font-weight:800;font-size:14px;text-decoration:underline;cursor:pointer}
.answord{min-height:40px;font-size:34px;font-weight:900;color:var(--mint-d);margin-top:4px;opacity:0;transition:.15s}
.answord.show{opacity:1}
.foot{color:var(--ink2);font-size:13px;font-weight:600;line-height:1.6;margin-top:16px;padding:0 8px}
.dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.dot{width:9px;height:9px;border-radius:50%;background:#E3DAC9}.dot.on{background:var(--coral);transform:scale(1.3)}.dot.seen{background:var(--mint-d)}
