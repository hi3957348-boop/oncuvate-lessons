body{font-family:"Pretendard","Malgun Gothic",system-ui,sans-serif;color:#2b2450;margin:0;background:#eee}
.sheet{background:#fff;max-width:820px;margin:16px auto;padding:26px 30px;min-height:1000px}
.top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #6A5DA7;padding-bottom:10px;margin-bottom:4px}
.title{font-size:22px;font-weight:900}.title small{display:block;font-size:12px;color:#9490AA;font-weight:700;margin-top:3px}
.namebox{font-size:12.5px;color:#5c5480;font-weight:700;text-align:right}.namebox span{display:inline-block;border-bottom:1px solid #bbb;width:82px;margin-left:4px}
.hd{display:flex;justify-content:space-between;align-items:center;margin:16px 0 4px}
h2{font-size:17px;margin:0;padding:7px 14px;background:#EEEBF8;border-radius:8px;color:#4b4470}
.desc{font-size:12.5px;color:#7a72a0;font-weight:700;margin:8px 0 12px}
.qrbox{text-align:center;flex:none;margin-left:14px}.qrbox img{width:104px;height:104px;border:1px solid #eee}
.qrbox .u{font-size:10px;color:#9490AA;margin-top:2px}
.num{display:inline-flex;align-items:center;justify-content:center;width:23px;height:23px;background:#6A5DA7;color:#fff;border-radius:50%;font-size:12.5px;font-weight:800;flex:none}
.s1grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px 30px;margin-top:6px}
.s1item{display:flex;align-items:center;gap:9px;font-size:22px;font-weight:800}
.prompt{font-size:24px;color:#8a83b0}.arrow{color:#B7ADE0;font-size:20px}.wl{flex:1;border-bottom:2px solid #6A5DA7;height:30px;min-width:110px}
.bank{display:flex;gap:8px;flex-wrap:wrap;background:#F7F6FC;border:1px dashed #B7ADE0;border-radius:10px;padding:8px 12px;margin-bottom:14px}
.bankchip{font-size:16px;font-weight:900;color:#6A5DA7;padding:2px 10px;background:#fff;border-radius:8px;border:1px solid #E2DEEF}
.s2item{display:flex;align-items:flex-start;gap:9px;font-size:21px;font-weight:800;padding:9px 0;line-height:2}
.s2sent{line-height:2.1}
.pbox{display:inline-block;width:40px;height:30px;border:2px solid #6A5DA7;border-radius:5px;margin:0 3px;vertical-align:-6px}
.s3item{margin:10px 0 16px}.s3head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.grid{display:flex;margin:3px 0}.cell{width:31px;height:31px;border:1px solid #b9b3d6;margin-right:-1px;background:#fff}
.ans{margin-top:20px;border:1px dashed #c9c3e0;border-radius:10px;padding:10px 14px;font-size:11.5px;color:#7a72a0;line-height:1.9}
.anstitle{font-weight:900;color:#6A5DA7;margin-bottom:3px}.ans b{color:#5c5480}
.foot{text-align:center;font-size:10.5px;color:#b3adc9;margin-top:18px}
.printbtn{position:fixed;top:12px;right:12px;background:#6A5DA7;color:#fff;border:0;padding:10px 18px;border-radius:10px;font-weight:800;cursor:pointer;font-size:14px}
@media print{.printbtn{display:none}body{background:#fff}.sheet{margin:0;max-width:none;padding:0;min-height:auto}.cell,.bankchip,h2,.num,.qrbox img{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
