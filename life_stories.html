<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>온큐리더기</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6A5DA7">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="온큐리딩">
<style>
  :root{color-scheme:light;--bg:#F5F4FA;--card:#fff;--ink:#1C1A2E;--muted:#9490AA;--line:#E2DEEF;
    --purple:#6A5DA7;--cyan:#1BBCD4;--soft:#EEEBF8;}
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1040px;margin:0 auto;padding:26px 18px 70px;}
  header{display:flex;align-items:center;gap:14px;margin-bottom:6px;flex-wrap:wrap;}
  .oclogo{height:38px;}
  h1{margin:0;font-size:24px;font-weight:900;letter-spacing:-.3px;
    background:linear-gradient(90deg,var(--purple),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);font-size:13.5px;margin:2px 0 22px;font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px;}
  .card{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);
    border-radius:18px;overflow:hidden;box-shadow:0 6px 22px rgba(60,50,120,.07);transition:transform .13s,box-shadow .13s;}
  .card:hover{transform:translateY(-4px);box-shadow:0 14px 34px rgba(60,50,120,.16);border-color:var(--purple);}
  .cover{aspect-ratio:16/10;background:#eee;overflow:hidden;position:relative;}
  .cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .lvl{position:absolute;top:8px;left:8px;background:rgba(106,93,167,.92);color:#fff;font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:20px;box-shadow:0 2px 6px rgba(0,0,0,.15);}
  .meta{padding:13px 15px 16px;}
  .bt{font-size:17px;font-weight:900;letter-spacing:-.2px;}
  .ba{font-size:12.5px;color:var(--muted);font-weight:700;margin-top:3px;}
  .bp{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:11px;}
  .pg{background:var(--soft);color:var(--purple);font-size:11.5px;font-weight:800;padding:4px 9px;border-radius:20px;}
  .lic{font-size:10px;color:var(--muted);font-weight:700;}
  .homecta{border:1px solid var(--line);background:#fff;color:var(--purple);font-weight:800;text-decoration:none;padding:9px 16px;border-radius:22px;font-size:13px;box-shadow:0 3px 10px rgba(60,50,120,.10);white-space:nowrap;}
  .homecta:hover{background:var(--soft);border-color:var(--purple);}
  .bigbrand{text-align:center;font-size:clamp(52px,11vw,76px);font-weight:900;letter-spacing:-1.5px;background:linear-gradient(90deg,var(--purple),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;margin:38px 0 4px;}
  footer{margin-top:30px;font-size:11.5px;color:var(--muted);line-height:1.8;text-align:center;}
  footer a{color:var(--muted);}
  @media (prefers-color-scheme:dark) and (min-width:100000px){
    :root{--bg:#17151F;--card:#211E2C;--ink:#ECEAF5;--line:#332E44;--soft:#2A2540;--muted:#9C97B4;}
    body{background:var(--bg);color:var(--ink);}
  }
  *{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;-webkit-touch-callout:none;}
  input,textarea,select{-webkit-user-select:text;user-select:text;}
  img{-webkit-user-drag:none;user-drag:none;}
</style><style>/*OC_PROTECT2*/*{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;-webkit-touch-callout:none;}input,textarea,select,[contenteditable]{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text;}img{-webkit-user-drag:none;user-drag:none;}</style><script>/*OC_PROTECT2*/document.addEventListener('contextmenu',function(e){e.preventDefault();});document.addEventListener('dragstart',function(e){var t=e.target; if(t&&t.tagName==='IMG') e.preventDefault();});</script><style>
  .folders{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:22px;margin-top:6px;}
  .folder{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);
    border-radius:22px;overflow:hidden;box-shadow:0 8px 26px rgba(60,50,120,.09);transition:transform .13s,box-shadow .13s;}
  .folder:hover{transform:translateY(-5px);box-shadow:0 18px 40px rgba(60,50,120,.18);border-color:var(--purple);}
  .folder .cover{aspect-ratio:16/9;}
  .fmeta{padding:18px 20px 20px;}
  .ftitle{font-size:22px;font-weight:900;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;}
  .fdesc{font-size:13.5px;color:var(--muted);font-weight:600;margin-top:6px;line-height:1.6;}
  .fcount{display:inline-block;margin-top:12px;background:var(--soft);color:var(--purple);
    font-size:12px;font-weight:800;padding:5px 12px;border-radius:20px;}
  .backlink{display:inline-block;margin-bottom:14px;color:var(--purple);font-weight:800;font-size:13.5px;
    text-decoration:none;border:1px solid var(--line);background:#fff;padding:8px 16px;border-radius:20px;}
  .backlink:hover{background:var(--soft);border-color:var(--purple);}
  .pagetitle{text-align:center;font-size:27px;font-weight:900;letter-spacing:-.4px;margin:2px 0 4px;
    background:linear-gradient(90deg,var(--purple),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;}
